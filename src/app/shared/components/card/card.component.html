<mat-card class="app-card">
  @if (title) {
    <mat-card-header>
      <mat-card-title>{{ title }}</mat-card-title>
      @if (subtitle) {
        <mat-card-subtitle>{{ subtitle }}</mat-card-subtitle>
      }
    </mat-card-header>
  }
  <mat-card-content>
    <ng-content />
    @if (badges.length) {
      <div class="badges">
        @for (badge of badges; track badge) {
          <app-badge [label]="badge" />
        }
      </div>
    }
  </mat-card-content>
  <mat-card-actions>
    <ng-content select="[card-actions]" />
  </mat-card-actions>
</mat-card>
