  <rect width="620" height="300" fill="#f8fafc"/>
  <style>.e{fill:#fff;stroke:#334155;stroke-width:1.5;rx:6}.t{font:600 12px Arial,sans-serif;fill:#0f172a}.r{stroke:#64748b;stroke-width:1.5;fill:none}</style>
  <rect class="e" x="240" y="20" width="140" height="44"/><text class="t" x="310" y="47" text-anchor="middle">CUSTOMER</text>
  <rect class="e" x="40" y="110" width="120" height="44"/><text class="t" x="100" y="137" text-anchor="middle">PRODUCT</text>
