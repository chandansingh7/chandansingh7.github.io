<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" role="img" aria-label="Micro-URL ER diagram">
  <rect width="520" height="280" fill="#f8fafc"/>
  <style>.e{fill:#fff;stroke:#334155;stroke-width:1.5;rx:6}.t{font:600 13px Arial,sans-serif;fill:#0f172a}.r{stroke:#64748b;stroke-width:1.5;fill:none;marker-end:url(#m)}</style>
  <defs><marker id="m" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/></marker></defs>
  <rect class="e" x="30" y="40" width="120" height="50"/><text class="t" x="90" y="70" text-anchor="middle">USER</text>
  <rect class="e" x="200" y="40" width="140" height="50"/><text class="t" x="270" y="70" text-anchor="middle">URL_MAPPING</text>
  <rect class="e" x="390" y="40" width="110" height="50"/><text class="t" x="445" y="70" text-anchor="middle">CLICK_EVENT</text>
  <line class="r" x1="150" y1="65" x2="200" y2="65"/><line class="r" x1="340" y1="65" x2="390" y2="65"/>
  <text class="t" x="260" y="140" text-anchor="middle">1:N relationships</text>
</svg>
