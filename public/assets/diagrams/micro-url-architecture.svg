<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-label="Micro-URL architecture">
  <rect width="720" height="220" fill="#f8fafc"/>
  <style>.box{fill:#fff;stroke:#2563eb;stroke-width:2;rx:8}.t{font:600 14px Arial,sans-serif;fill:#0f172a}.s{font:12px Arial,sans-serif;fill:#475569}.a{stroke:#64748b;stroke-width:2;marker-end:url(#m);fill:none}</style>
  <defs><marker id="m" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/></marker></defs>
  <rect class="box" x="40" y="60" width="140" height="80"/><text class="t" x="110" y="95" text-anchor="middle">Client</text><text class="s" x="110" y="118" text-anchor="middle">REST / Browser</text>
  <rect class="box" x="290" y="60" width="160" height="80"/><text class="t" x="370" y="95" text-anchor="middle">Spring Boot</text><text class="s" x="370" y="118" text-anchor="middle">Micro-URL API</text>
  <rect class="box" x="560" y="60" width="120" height="80"/><text class="t" x="620" y="95" text-anchor="middle">MySQL</text><text class="s" x="620" y="118" text-anchor="middle">Mappings</text>
  <line class="a" x1="180" y1="100" x2="290" y2="100"/><line class="a" x1="450" y1="100" x2="560" y2="100"/>
  <text class="s" x="360" y="30" text-anchor="middle">Stateless URL shortener service</text>
</svg>
