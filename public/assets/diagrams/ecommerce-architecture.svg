<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-label="E-Commerce architecture">
  <rect width="720" height="220" fill="#f8fafc"/>
  <style>.box{fill:#fff;stroke:#2563eb;stroke-width:2;rx:8}.t{font:600 14px Arial,sans-serif;fill:#0f172a}.s{font:12px Arial,sans-serif;fill:#475569}.a{stroke:#64748b;stroke-width:2;marker-end:url(#m);fill:none}</style>
  <defs><marker id="m" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/></marker></defs>
  <rect class="box" x="40" y="60" width="160" height="80"/><text class="t" x="120" y="95" text-anchor="middle">Angular UI</text><text class="s" x="120" y="118" text-anchor="middle">ecommerce-ui</text>
  <rect class="box" x="280" y="60" width="160" height="80"/><text class="t" x="360" y="95" text-anchor="middle">Spring Boot</text><text class="s" x="360" y="118" text-anchor="middle">Ecommerce-Api</text>
  <rect class="box" x="520" y="60" width="160" height="80"/><text class="t" x="600" y="95" text-anchor="middle">Database</text><text class="s" x="600" y="118" text-anchor="middle">JPA entities</text>
  <line class="a" x1="200" y1="100" x2="280" y2="100"/><line class="a" x1="440" y1="100" x2="520" y2="100"/>
</svg>
